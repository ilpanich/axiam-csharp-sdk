name: Coverage

# Line coverage for the two published packages, reported to Coveralls.
#
# coverlet (bundled with every test project via the Microsoft.NET.Test.Sdk /
# `--collect:"XPlat Code Coverage"` data collector) emits Cobertura by default;
# Coveralls' action consumes lcov, so the format is switched explicitly via the
# DataCollectionRunSettings knob below. Both test projects write their own
# lcov.info under TestResults/, and coverallsapp/github-action globs them.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    name: Test coverage (coverlet -> Coveralls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          dotnet-version: '8.0.x'

      - name: dotnet restore
        run: dotnet restore Axiam.Sdk.sln

      - name: dotnet build (Release)
        run: dotnet build Axiam.Sdk.sln -c Release --no-restore

      # `--collect:"XPlat Code Coverage"` is coverlet's data-collector mode. Its
      # output format is set through the runsettings the collector reads, NOT via
      # /p:CoverletOutputFormat (that MSBuild property only applies to coverlet's
      # msbuild integration, which this repo does not reference) — so the format is
      # passed inline with the RunConfiguration override below.
      #
      # ExcludeByFile drops generated code under any obj/ directory (the gRPC/protobuf
      # client stubs under Axiam.Sdk/obj/**/axiam/v1/*.cs). Those files are build output,
      # not tracked in git, and Coveralls' coverage-reporter cannot map an untracked
      # source path to a git blob — it aborts the whole tracefile with
      # "KeyError: Missing hash key: nil" the moment it sees one, so they must never
      # reach the lcov report in the first place.
      - name: dotnet test (with coverage)
        run: >
          dotnet test Axiam.Sdk.sln -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --logger "console;verbosity=normal"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=lcov
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/obj/**/*.cs"

      # Each test project writes its own lcov.info into a GUID-named subdirectory
      # of ./TestResults. Coveralls needs a single file, so merge them: lcov is a
      # line-oriented, concatenable format (records are delimited by end_of_record),
      # so concatenation is a valid merge and Coveralls folds the per-file records —
      # PROVIDED every file ends on a newline. Plain `cat` does not insert one, and
      # coverlet's per-project coverage.info does not end with a trailing newline, so
      # naive `cat file1 file2` glues file1's last `end_of_record` directly onto
      # file2's first `SF:` line into one corrupted line. That line stops being a
      # valid record boundary, and Coveralls' lcov parser aborts the entire tracefile
      # with "KeyError: Missing hash key: nil" once it loses track of the current
      # file. `awk 1` normalizes this: it reprints every input record (regardless of
      # source file) followed by a newline, so the join is always newline-safe.
      - name: Merge lcov reports
        run: |
          set -euo pipefail
          find ./TestResults \( -name 'coverage.info' -o -name 'lcov.info' \) -print | tee /dev/stderr | xargs awk 1 > ./lcov.info
          if [ ! -s ./lcov.info ]; then
            echo "::error::No lcov coverage report was produced by dotnet test."
            exit 1
          fi
          wc -l ./lcov.info

      # Regression gate: fail if merged line coverage drops below the floor.
      # The two test projects each instrument the shared Axiam.Sdk assembly, so
      # a line covered by EITHER run counts as covered (union) — the same fold
      # Coveralls applies. Set below the current ~93.7% so it never false-fails;
      # ratchet upward as coverage rises.
      - name: Enforce coverage floor
        run: |
          total=$(awk -F: '
            /^SF:/ { sf=$2 }
            /^DA:/ {
              split($2, a, ",");
              key = sf ":" a[1];
              if (a[2]+0 > 0) cov[key]=1; else if (!(key in cov)) cov[key]=0;
            }
            END { t=0; c=0; for (k in cov) { t++; if (cov[k]) c++ } printf "%.2f", (t ? 100*c/t : 0) }
          ' ./lcov.info)
          echo "Merged line coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t+0 >= 92) ? 0 : 1 }' || {
            echo "::error::coverage ${total}% is below the 92% floor"; exit 1;
          }

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./lcov.info
          format: lcov
